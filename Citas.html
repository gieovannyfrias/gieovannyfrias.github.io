  <title>Agencia de citas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <!-- Font Awesome para iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
     <meta name="title" content="Agencia de citas"/>

    <meta name="description" content="Todos los creadores mediante colaboración de creadores, marcas, organizaciones y etc."/>
<meta name="robots" content="index, noimageindex">
<meta name="robots" content="follow"/>
<meta name="keywords" content="gieovannyfrias,gieovanny"/>
<meta name="author" content="Gieovanny Frias">
</head>
<body>
  <div class="wrapper">
  <div class="form-container">
    <h2>Agendar Cita</h2>
    <form id="citaForm" action="https://formspree.io/f/xaqkwraq" method="POST">
      <label for="nombre">Nombre:</label>
      <input type="text" name="nombre" id="nombre" required>

      <label for="correo">Correo:</label>
      <input type="email" name="correo" id="correo" required>

      <label for="telefono">Teléfono:</label>
      <input type="tel" name="telefono" id="telefono" required>

      <label for="servicio">Servicio:</label>
      <select name="servicio" id="servicio" required>
        <option value="">Seleccione...</option>
        <option value="Grabación de video">Grabación de video</option>
        <option value="Sesión de fotos">Sesión de fotos</option>
        <option value="Edición de contenido">Edición de contenido</option>
        <option value="Reunión con marcas">Reunión con marcas</option>
        <option value="Planificación de publicaciones">Planificación de publicaciones</option>
        <option value="Sesión en vivo">Sesión en vivo</option>
        <option value="Brainstorming creativo">Brainstorming creativo</option>
        <option value="Colaboraciones">Colaboraciones</option>
        <option value="Otro">Otro</option>
      </select>

      <label for="fecha">Fecha:</label>
      <input type="date" name="fecha" id="fecha" required>

      <label for="hora">Hora:</label>
      <input type="time" name="hora" id="hora" required>

      <label for="motivo">Motivo:</label>
      <textarea name="motivo" id="motivo" rows="3" required></textarea>

      <label>
        <input type="checkbox" id="terminos" required> Acepto los términos y condiciones
      </label>

      <button class="btn_0" type="submit">Agendar</button>
    </form>
  </div>

  <!-- Bloque para impresión -->
  <div id="citaImprimir" style="display:none;"></div>
  </div>
  <style>
    /* 🎨 Estilo moderno minimalista 2026 */
     :root {
      --color-bg: #0a0a0a;
      --color-card: #111111;
      --color-text: #ffffff;
      --color-border: #ffffff;
      --radius: 14px;
      --shadow: 0 8px 20px rgba(255,255,255,0.15);
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      zoom:75%;
    }
    .wrapper{
      	max-width: 1000px;
	margin: 0 auto;
	padding: 32px;
      position: relative;
      top: 150px;
    }
    .form-container {
      background: var(--color-card);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 420px;
      border: 2px solid var(--color-border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .form-container:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(255,255,255,0.25);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.8em;
      font-weight: 700;
      color: var(--color-text);
      border-bottom: 2px solid var(--color-border);
      padding-bottom: 8px;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: 600;
      font-size: 0.9em;
      color: var(--color-text);
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 2px solid var grey;
      border-radius: var(--radius);
      font-size: 0.95em;
      background: white;
      transition: all 0.3s ease;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #888;
      background: wheat;
      box-shadow: 0 0 10px rgba(255,255,255,0.25);
      outline: none;
    }

    .btn_0 {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      background: #000;
      color: #fff;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.3s ease, color 0.3s ease;
    }
    .btn_0:hover {
      transform: translateY(-2px);
      background: #fff;
      color: #000;
    }

    /* 📱 Adaptación móvil */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .form-container {
        padding: 18px;
        border-radius: 10px;
      }
      h2 {
        font-size: 1.5em;
      }
      input, textarea, select {
        font-size: 0.9em;
        padding: 10px;
      }
      .btn_0 {
        font-size: 0.95em;
        padding: 12px;
      }
    }

    @media print {
      body { background: #fff; }
      .form-container { display: none; }
      #citaImprimir {
        display: block !important;
        width: 80mm;
        margin: 0 auto;
        padding: 20px;
        border: 2px dashed #000;
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 0.95em;
        color: #000;
      }
      #citaImprimir h2 {
        text-align: center;
        margin-bottom: 15px;
        border-bottom: 1px solid #000;
        padding-bottom: 8px;
      }
      #citaImprimir p { margin: 6px 0; }
    }
  
  </style>
    <!-- La ruta debe recorrer todas las carpetas -->
<script src="src/components/Header/header.js" defer></script>
<script src="src/components/Footer/footer.js" defer></script>
  <script>
    const form = document.getElementById('citaForm');
    const citaImprimir = document.getElementById('citaImprimir');

    form.addEventListener('submit', function(e) {
      if(!document.getElementById('terminos').checked){
        e.preventDefault();
        alert("Debes aceptar los términos y condiciones.");
        return;
      }

      // Capturar datos
      const nombre = document.getElementById('nombre').value;
      const correo = document.getElementById('correo').value;
      const telefono = document.getElementById('telefono').value;
      const servicio = document.getElementById('servicio').value;
      const fecha = document.getElementById('fecha').value;
      const hora = document.getElementById('hora').value;
      const motivo = document.getElementById('motivo').value;

      // Generar comprobante
      citaImprimir.innerHTML = `
        <h2>Comprobante de Cita</h2>
        <p><strong>Nombre:</strong> ${nombre}</p>
        <p><strong>Correo:</strong> ${correo}</p>
        <p><strong>Teléfono:</strong> ${telefono}</p>
        <p><strong>Servicio:</strong> ${servicio}</p>
        <p><strong>Fecha:</strong> ${fecha}</p>
        <p><strong>Hora:</strong> ${hora}</p>
        <p><strong>Motivo:</strong> ${motivo}</p>
        <p style="text-align:center; margin-top:15px;">Gracias por agendar con nosotros</p>
      `;
      citaImprimir.style.display = "block";

      // 🔹 Imprimir primero
      window.print();
      // 🔹 Luego el formulario se envía automáticamente a Formspree
    });
  </script>
</body>
</html>
